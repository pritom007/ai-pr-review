name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      
      - uses: your-username/ai-pr-review@v1
        with:
          api-key: ${{ secrets.LLM_API_KEY }}
          model-name: 'gpt-4'
          base-url: 'https://your-llm-provider.com/v1'  # Optional
          temperature: 0.7
          max-tokens: 1000
          language: 'English'